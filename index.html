<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Wiki Demo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <script type="module" src="js/main.js"></script>
</head>
<body>
  <header>
    <h1>World Wiki</h1>
    <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
  </header>

  <div id="main-container">
    <main id="content">
      <button id="back-home-btn" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="back-icon">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
    </main>
    <div id="sidebar-container">
      <aside id="sidebar">
        <!-- Search Field -->
        <div id="sidebar-search">
          <input
            id="searchBar"
            type="text"
            placeholder="Search..."
            aria-label="Search pages"
          >
        </div>
        <!-- Sidebar links injected by JS -->
      </aside>
      <div id="overlay"></div>
    </div>
  </div>

  <footer>
    <p>© 2025 World Wiki Demo</p>
  </footer>
</body>
</html>
